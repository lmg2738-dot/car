name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          OPENROUTER_API_KEY: sk-or-placeholder-for-ci-build
          NEXT_PUBLIC_APP_URL: http://localhost:50006
